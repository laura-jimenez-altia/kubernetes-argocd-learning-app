apiVersion: apps/v1
kind: Deployment

metadata:
  name: learning-app

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: learning-app

  template:
    metadata:
      labels:
        app: learning-app

    spec:
      containers:
        - name: learning-app

          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: 3000

          env:
            - name: NODE_ENV
              value: {{ .Values.env }}