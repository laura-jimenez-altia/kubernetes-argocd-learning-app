apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: learning-app

spec:
  ingressClassName: nginx

  rules:
    - host: learning-app.local

      http:
        paths:
          - path: /
            pathType: Prefix

            backend:
              service:
                name: learning-app

                port:
                  number: 3000